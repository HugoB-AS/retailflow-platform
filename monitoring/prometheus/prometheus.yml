global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "retailflow-fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8000"]

  - job_name: "retailflow-postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]
