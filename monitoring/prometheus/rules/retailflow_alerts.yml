groups:
  - name: retailflow-platform-alerts
    rules:
      - alert: RetailFlowFastAPIDown
        expr: up{job="retailflow-fastapi"} == 0
        for: 1m
        labels:
          severity: critical
          component: fastapi
        annotations:
          summary: "RetailFlow FastAPI is down"
          description: "Prometheus cannot scrape the FastAPI /metrics endpoint for more than 1 minute."

      - alert: RetailFlowPostgresExporterDown
        expr: up{job="retailflow-postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: postgres
        annotations:
          summary: "RetailFlow PostgreSQL exporter is down"
          description: "Prometheus cannot scrape postgres_exporter metrics for more than 1 minute."

      - alert: RetailFlowHighFastAPIRequestLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="retailflow-fastapi"}[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
          component: fastapi
        annotations:
          summary: "RetailFlow FastAPI high request latency"
          description: "The FastAPI p95 request latency is above 1 second for more than 5 minutes."

      - alert: RetailFlowFastAPIHighErrorRate
        expr: sum(rate(http_requests_total{job="retailflow-fastapi",status=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          component: fastapi
        annotations:
          summary: "RetailFlow FastAPI 5xx errors detected"
          description: "FastAPI has returned HTTP 5xx responses during the last 5 minutes."

      - alert: RetailFlowPostgresTooManyConnections
        expr: pg_stat_activity_count{job="retailflow-postgres"} > 80
        for: 5m
        labels:
          severity: warning
          component: postgres
        annotations:
          summary: "RetailFlow PostgreSQL high connection count"
          description: "PostgreSQL has more than 80 active connections for more than 5 minutes."
